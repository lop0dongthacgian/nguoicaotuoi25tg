<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Chăm sóc người cao tuổi</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">

    <!-- MÀN HÌNH CHỌN VAI TRÒ -->
    <div id="roleScreen" class="role-screen">
      <div class="logo-circle">🌿</div>
      <h1>Chăm Sóc Người Cao Tuổi</h1>
      <p>Ứng dụng kết nối chi hội &amp; chăm sóc sức khoẻ<br>người cao tuổi</p>
      <button class="role-btn member" onclick="chonVaiTro('thanhvien')">👤 &nbsp;Tôi là Thành viên</button>
      <button class="role-btn admin" onclick="moDangNhapAdmin()">🛡️ &nbsp;Quản trị viên</button>
    </div>

    <!-- ỨNG DỤNG CHÍNH -->
    <div id="mainApp" style="display:none;">
      <div class="app-header">
        <div class="title-row">
          <div class="spacer"></div>
          <h1 id="headerTitle">🌿 Trang chủ</h1>
          <button class="icon-btn" onclick="dangXuat()" title="Thoát">↩️</button>
        </div>
        <div class="subtitle" id="headerSub">Chăm sóc người cao tuổi</div>
      </div>
      <div class="content" id="content"></div>
    </div>

    <div class="bottom-nav" id="bottomNav" style="display:none;"></div>
  </div>

  <div id="modalOverlay" class="modal-overlay" style="display:none;"></div>
  <div id="toast" class="toast" style="display:none;"></div>

  <script src="js/config.js"></script>
  <script src="js/chihoi.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
