<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2196F3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Chăm sóc Người cao tuổi</title>
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <span class="material-icons splash-icon">elderly</span>
            <h1>Chăm sóc Người cao tuổi</h1>
            <div class="loading-spinner"></div>
            <p>Đang tải dữ liệu...</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app" style="display: none;">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <button id="backButton" class="icon-button" style="display: none;" onclick="goBack()">
                    <span class="material-icons">arrow_back</span>
                </button>
            </div>
            <h1 class="header-title">🏥 Chăm sóc NCT</h1>
            <div class="header-right">
                <button class="icon-button" onclick="toggleDarkMode()" title="Chế độ tối/sáng">
                    <span class="material-icons" id="darkModeIcon">dark_mode</span>
                </button>
                <button id="logoutButton" class="icon-button" style="display: none;" onclick="logout()" title="Đăng xuất">
                    <span class="material-icons">logout</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- Login Screen -->
            <div id="loginScreen" class="screen active">
                <div class="login-container">
                    <div class="login-card card">
                        <span class="material-icons login-icon">elderly</span>
                        <h2>Chăm sóc Người cao tuổi</h2>
                        <p class="login-subtitle">Chi hội Người cao tuổi</p>
                        
                        <div class="login-tabs">
                            <button class="tab-button active" onclick="switchLoginTab('member')">Thành viên</button>
                            <button class="tab-button" onclick="switchLoginTab('admin')">Quản trị</button>
                        </div>

                        <!-- Member Login -->
                        <div id="memberLogin" class="login-form active">
                            <p class="login-info">
                                <span class="material-icons">info</span>
                                Đăng nhập với tư cách thành viên để xem thông tin và gửi ý kiến
                            </p>
                            <button class="btn btn-primary btn-block" onclick="loginAsMember()">
                                <span class="material-icons">person</span>
                                Vào với tư cách Thành viên
                            </button>
                        </div>

                        <!-- Admin Login -->
                        <div id="adminLogin" class="login-form" style="display: none;">
                            <div class="form-group">
                                <label for="adminPassword">Mật khẩu quản trị</label>
                                <div class="password-input-group">
                                    <input type="password" id="adminPassword" class="form-control" placeholder="Nhập mật khẩu">
                                    <button type="button" class="toggle-password" onclick="togglePassword('adminPassword')">
                                        <span class="material-icons">visibility_off</span>
                                    </button>
                                </div>
                            </div>
                            <button class="btn btn-primary btn-block" onclick="loginAsAdmin()">
                                <span class="material-icons">admin_panel_settings</span>
                                Đăng nhập
                            </button>
                            <p class="login-hint">Mật khẩu mặc định: admin2026</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Home Screen -->
            <div id="homeScreen" class="screen">
                <div class="home-menu">
                    <button class="menu-item" onclick="showSection('thongbao')">
                        <span class="material-icons menu-icon">campaign</span>
                        <span class="menu-text">Thông báo</span>
                    </button>
                    <button class="menu-item" onclick="showSection('thanhvien')">
                        <span class="material-icons menu-icon">groups</span>
                        <span class="menu-text">Thành viên</span>
                    </button>
                    <button class="menu-item" onclick="showSection('gopy')">
                        <span class="material-icons menu-icon">forum</span>
                        <span class="menu-text">Gửi ý kiến</span>
                    </button>
                    <button class="menu-item" onclick="showSection('baotin')">
                        <span class="material-icons menu-icon">favorite</span>
                        <span class="menu-text">Báo tin sức khỏe</span>
                    </button>
                    <button class="menu-item" onclick="showSection('ungho')">
                        <span class="material-icons menu-icon">volunteer_activism</span>
                        <span class="menu-text">Ủng hộ quỹ</span>
                    </button>
                    <button class="menu-item" onclick="showSection('taichinh')">
                        <span class="material-icons menu-icon">account_balance_wallet</span>
                        <span class="menu-text">Công khai tài chính</span>
                    </button>
                </div>
            </div>

            <!-- Sections Container -->
            <div id="sectionsContainer" style="display: none;"></div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav" id="bottomNav">
            <button class="nav-item active" onclick="navigateTo('home')">
                <span class="material-icons">home</span>
                <span class="nav-label">Trang chủ</span>
            </button>
            <button class="nav-item" id="adminNavButton" style="display: none;" onclick="navigateTo('admin')">
                <span class="material-icons">dashboard</span>
                <span class="nav-label">Quản trị</span>
            </button>
        </nav>

        <!-- Toast Container -->
        <div id="toastContainer" class="toast-container"></div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/chihoi.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
